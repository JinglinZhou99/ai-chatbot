<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <div id="doc-panel">
            <h2>Document Management</h2>
            <hr>
            
            <div class="panel-section">
                <h3>Upload Document</h3>
                <form id="upload-form">
                    <input type="file" id="file-input">
                    <button type="button" id="upload-btn">Upload</button>
                </form>
            </div>

            <div class="panel-section">
                <h3>Uploaded Documents</h3>
                <div id="uploaded-docs">
                    <p class="empty-state">No documents uploaded yet</p>
                </div>
            </div>

            <div class="panel-section highlight-box">
                <h3>Retrieval Method</h3>
                <select id="retrieval-method">
                    <option value="semantic">Semantic (Embeddings)</option>
                    <option value="tfidf">TF-IDF (Keyword)</option>
                </select>
            </div>
        </div>

        <div id="chat-container">
            <h2>AI Chat</h2>
            <hr>
            
            <div id="messages">
                </div>

            <div class="input-area">
                <input type="text" id="user-input" placeholder="Begin chatting...">
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
